<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>STACKED - Register</title>
        <link rel="stylesheet" href="../assets/css/style.css" />
    </head>
    <body>
        <div class="container">
            <div class="logo">
                <img src="../assets/images/logoBranca.png" alt="Logo STACKED" />
            </div>
            <div class="form">
                <form action="#" method="POST">
                    <div class="inputs">
                        <div class="input-box">
                            <label for="name">NOME COMPLETO</label>
                            <input
                                type="text"
                                id="name"
                                name="name"
                                class="deactivated"
                            />
                        </div>
                        <div class="input-box">
                            <label for="cpf">CPF</label>
                            <input
                                type="text"
                                id="cpf"
                                name="cpf"
                                class="deactivated"
                            />
                        </div>
                        <div class="input-box">
                            <label for="email">EMAIL</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                class="deactivated"
                            />
                        </div>
                        <div class="input-box">
                            <label for="password">SENHA</label>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="deactivated"
                            />
                        </div>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn-main">
                            CADASTRE-SE
                        </button>

                        <div class="divider">
                            <span>OU</span>
                        </div>

                        <a href="login.html" class="btn-secondary">ENTRE</a>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>

<script src="../assets/js/script.js"></script>
