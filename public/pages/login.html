<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>STACKED - Login</title>
        <link rel="stylesheet" href="../assets/css/style.css" />
        <link rel="stylesheet" href="../assets/css/login.css" />
        <link
            rel="shortcut icon"
            href="../assets/images/logoEscuro.png"
            type="image/x-icon"
        />
    </head>
    <body>
        <main class="container">
            <div class="logo logo-login">
                <img src="../assets/images/logoBranca.png" alt="Logo STACKED" />
            </div>
            <div class="form">
                <form action="#" method="post" class="form-login">
                    <div class="input-box">
                        <label for="cpf">CPF</label>
                        <input
                            type="text"
                            id="cpf"
                            name="cpf"
                            class="deactivated"
                        />
                    </div>
                    <div class="input-box">
                        <label for="password">SENHA</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="deactivated"
                        />
                        <div class="forgot-password">
                            <a href="#">Esqueceu a senha?</a>
                        </div>
                    </div>
                    <div class="actions">
                        <button type="submit" class="btn-main">ENTRE</button>
                        <div class="divider">
                            <span>OU</span>
                        </div>

                        <a href="index.html" class="btn-secondary"
                            >CADASTRE-SE</a
                        >
                    </div>
                </form>
            </div>
        </main>
    </body>
</html>
